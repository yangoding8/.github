<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="unsafe-url">
    <title>Cloud Files</title>
    <meta name="description" content="Secure download portal" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                Helvetica, Arial, sans-serif;
            background-color: #010409;
            color: #f0f6fc;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .github-header {
            background-color: #010409;
            border-bottom: 1px solid #21262d;
            padding: 16px 0;
            width: 100%;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .github-logo {
            width: 32px;
            height: 32px;
            fill: #f0f6fc;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .download-container {
            background-color: #0c1015;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 16px 32px rgba(1, 4, 9, 0.85);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #f0f6fc;
        }

        .loading-container {
            margin-top: 32px;
            text-align: center;
        }

        .spinner-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .github-footer {
            background-color: #010409;
            border-top: 1px solid #21262d;
            padding: 24px;
            margin-top: auto;
            width: 100%;
        }

        .footer-bottom {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .footer-logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-logo {
            width: 24px;
            height: 24px;
            fill: #6e7681;
        }

        .footer-copyright {
            color: #6e7681;
            font-size: 12px;
        }

        .footer-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-links a,
        button {
            color: #8b949e;
            text-decoration: none;
            font-size: 12px;
        }

        .footer-links a:hover,
        button:hover {
            color: #58a6ff;
        }

        .page-wrapper {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .github-style-button {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                Helvetica, Arial, sans-serif;
            background-color: transparent;
            border: 0;
            padding: 0;
            text-align: left;
            cursor: pointer;
            display: inline-block;
            transition: color 0.2s ease-in-out;
        }

        @media (max-width: 640px) {
            .download-container {
                margin: 100px 16px 16px;
                padding: 24px;
            }

            .header-content {
                padding: 0 16px;
            }
        }

        @media (max-width: 768px) {
            .footer-bottom {
                flex-direction: column;
                align-items: flex-start;
            }

            .footer-links {
                gap: 16px;
            }
        }
    </style>
</head>
